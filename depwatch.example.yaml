# depwatch.example.yaml — copy to depwatch.yaml and fill in your values.

# How often depwatch checks for new releases (e.g. 1h, 6h, 24h).
# Defaults to 24h if omitted.
check_interval: 24h

# List of dependencies to monitor.
dependencies:
  - name: react
    ecosystem: npm       # supported: npm, pypi, go, rubygems, maven
    version: "18.2.0"   # currently pinned version

  - name: requests
    ecosystem: pypi
    version: "2.31.0"

  - name: github.com/gin-gonic/gin
    ecosystem: go
    version: "v1.9.1"

# Notification channels — configure at least one.
notifiers:
  slack:
    webhook_url: "https://hooks.slack.com/services/REPLACE/ME"
    channel: "#dependency-updates"

  email:
    smtp_host: smtp.example.com
    smtp_port: 587
    from: depwatch@example.com
    password: "s3cr3t"          # consider using an env var or secrets manager
    to:
      - team@example.com
      - security@example.com
